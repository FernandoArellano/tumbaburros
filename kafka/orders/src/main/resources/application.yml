server:
#  #port: 9100
  port: 0
spring:
  application:
    name: orders-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: false
      client:
        config:
          inventory-service:
            connectTimeout: 2000
            readTimeout: 2000
    function:
      definition: produceOrder;inventoryResultConsumer
    stream:
      default-binder: kafka
      kafka:
        binder:
          brokers: localhost:9092,localhost:9094
#          configuration:
#            key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
#            value.deserializer: org.apache.kafka.common.serialization.StringDeserializer

      bindings:
        # ? Producer binding
        produceOrder-out-0:
          destination: notificationTopic
          content-type: application/json

        # Saga pattern producer binding
        orderCreated-out-0:
          destination: inventoryTopic
          content-type: application/json

#       Saga Consumer binding
        inventoryResultConsumer-in-0:
          destination: inventory-result-topic
          group: my-order-group
          content-type: application/json
  mongodb:
    uri: mongodb://localhost:27017/ordersms

logging:
  level:
    org.springframework.cloud.stream: DEBUG
    org.springframework.kafka: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

resilience4j:
  retry:
    instances:
      inventoryRetry:
        maxAttempts: 2
        waitDuration: 1s
  circuitbreaker:
    instances:
      inventoryService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2

management:
  endpoints:
    web:
      exposure:
        include: "health,circuitbreakers,circuitbreakerevents" # Include relevant endpoints
  endpoint:
    health:
      show-details: "always"