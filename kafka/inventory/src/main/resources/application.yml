server:
  #port: 9300
  port: 0
spring:
  application:
    name: inventory-service
  cloud:
    function:
      definition: inventoryOrder;dlqConsumer
    stream:
      default-binder: kafka
      kafka:
        binder:
          brokers: localhost:9092,localhost:9094
        bindings:
          inventoryOrder-in-0:
            consumer:
              enableDlq: true
              dlqName: notificationTopic.DLT


      bindings:
        inventoryOrder-in-0:
          destination: notificationTopic
          group: my-inventory-group
          content-type: application/json
          consumer:
            use-native-decoding: false
            max-attempts: 3
            back-off-initial-interval: 2000
            back-off-max-interval: 5000
            back-off-multiplier: 2.0
            retryableExceptions:
              com.eazybites.inventory.exceptions.NonRetryableException: false
              com.eazybites.inventory.exceptions.RetryableException: true
              java.lang.IllegalArgumentException: false

        inventoryOrder-out-0:
          destination: processedOrdersTopic
          content-type: application/json

        dlqConsumer-in-0:
          destination: notificationTopic.DLT
          group: dlq-group

  mongodb:
    uri: mongodb://localhost:27017/inventoryms

logging:
  level:
    org.springframework.cloud.stream: DEBUG
    org.springframework.kafka: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true